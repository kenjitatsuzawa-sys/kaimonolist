<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>買い物リスト</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { width: 100%; max-width: 480px; }

    h1 { font-size: 22px; font-weight: 500; color: #111; margin-bottom: 1.25rem; }

    .input-row { display: flex; gap: 8px; margin-bottom: 1.25rem; }

    input[type="text"] {
      flex: 1;
      font-size: 17px;
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      outline: none;
      background: #fff;
      font-family: inherit;
      color: #111;
    }
    input[type="text"]::placeholder { color: #aaa; }
    input[type="text"]:focus { border-color: #999; }

    button#add-btn {
      padding: 10px 18px;
      border-radius: 12px;
      border: 1px solid #ddd;
      background: #fff;
      color: #111;
      font-size: 24px;
      font-weight: 300;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    button#add-btn:hover { background: #f0f0f0; }

    ul#list { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    li.list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      cursor: pointer;
      animation: slide-in 0.18s ease;
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    li.list-item:hover { background: #fafafa; }
    li.list-item.done  { opacity: 0.35; text-decoration: line-through; }

    .check-circle {
      width: 22px; height: 22px; flex-shrink: 0;
      border-radius: 50%;
      border: 1.5px solid #ccc;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      color: transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    li.list-item.done .check-circle {
      background: #e8f5e9;
      border-color: #66bb6a;
      color: #388e3c;
    }

    .item-label { flex: 1; font-size: 16px; color: #111; user-select: none; line-height: 1.4; }

    #empty-msg { text-align: center; color: #bbb; font-size: 14px; margin-top: 2rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 買い物リスト</h1>
    <div class="input-row">
      <input type="text" id="item-input" placeholder="追加する..." autocomplete="off" />
      <button id="add-btn" aria-label="追加">＋</button>
    </div>
    <ul id="list"></ul>
    <p id="empty-msg">まだ何もありません</p>
  </div>

  <script>
    const input    = document.getElementById('item-input');
    const addBtn   = document.getElementById('add-btn');
    const list     = document.getElementById('list');
    const emptyMsg = document.getElementById('empty-msg');
    const STORAGE_KEY = 'shopping-list';

    function save() {
      const items = [...list.querySelectorAll('.item-label')].map(el => el.textContent);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function updateEmpty() {
      emptyMsg.style.display = list.children.length === 0 ? '' : 'none';
    }

    function createItem(text) {
      const li = document.createElement('li');
      li.className = 'list-item';
      li.setAttribute('role', 'checkbox');
      li.setAttribute('aria-checked', 'false');
      li.setAttribute('tabindex', '0');

      const circle = document.createElement('span');
      circle.className = 'check-circle';
      circle.textContent = '✓';

      const label = document.createElement('span');
      label.className = 'item-label';
      label.textContent = text;

      li.appendChild(circle);
      li.appendChild(label);

      li.addEventListener('click', () => {
        li.classList.add('done');
        li.setAttribute('aria-checked', 'true');
        save();
        setTimeout(() => {
          li.style.transition = 'opacity 0.3s, max-height 0.3s, padding 0.3s';
          li.style.opacity = '0';
          li.style.maxHeight = '0';
          li.style.paddingTop = '0';
          li.style.paddingBottom = '0';
          li.style.overflow = 'hidden';
          setTimeout(() => {
            li.remove();
            save();
            updateEmpty();
          }, 320);
        }, 500);
      });

      li.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); li.click(); }
      });

      return li;
    }

    function addItem(text) {
      text = text.trim();
      if (!text) return;
      list.appendChild(createItem(text));
      save();
      updateEmpty();
    }

    function loadItems() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (!saved) return;
      try {
        JSON.parse(saved).forEach(text => list.appendChild(createItem(text)));
      } catch(e) {}
      updateEmpty();
    }

    addBtn.addEventListener('click', () => {
      addItem(input.value);
      input.value = '';
      input.focus();
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { addItem(input.value); input.value = ''; }
    });

    loadItems();
  </script>
</body>
</html>
